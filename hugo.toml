baseURL = "https://mustangpack300.org/"
languageCode = "en-us"
title = "Cub Scout Pack 300"

# Enable content section summaries
summaryLength = 50

# Pagination for news posts
[pagination]
  pagerSize = 6

[params]
  description = "Cub Scout Pack 300 — Do Your Best!"
  tagline = "Do Your Best"
  pack_number = "300"

  # Calendar subscribe URLs (shown as buttons on the Events page)
  # Google: https://calendar.google.com/calendar/r?cid=YOUR_CALENDAR_ID
  # Apple / iCal: webcal://calendar.google.com/calendar/ical/YOUR_CALENDAR_ID/public/basic.ics
  #
  # TODO: Scoutbook sync
  #   1. In Scoutbook → Calendar → Export/Subscribe → copy the ICS/webcal link
  #   2. In Google Calendar → + Other calendars → From URL → paste the link
  #      (Google will poll Scoutbook ~every 24h automatically)
  #   3. Update calendar_subscribe_google, calendar_subscribe_ical, and
  #      calendar_embed_url below to point at the Pack 300 Google Calendar
  #      (Settings → your calendar → Integrate calendar for the embed src URL)
  calendar_subscribe_google = "igpr8g4eooml2pp2omo7fv2707qgoob8@import.calendar.google.com"
  calendar_subscribe_ical   = "https://calendar.google.com/calendar/ical/igpr8g4eooml2pp2omo7fv2707qgoob8%40import.calendar.google.com/public/basic.ics"

  # Google Calendar embed URL
  # To get this: open Google Calendar → Settings (gear) → your calendar → "Integrate calendar"
  # Copy the "Embed code" src URL and paste it below.
  # Your calendar must be set to Public for this to work.
  calendar_embed_url = "https://calendar.google.com/calendar/embed?src=igpr8g4eooml2pp2omo7fv2707qgoob8%40import.calendar.google.com&ctz=America%2FChicago"

  # Location & meeting info (shown on homepage quick-facts strip)
  location         = "10928 SW 15th St, Yukon, OK 73099"
  meeting_schedule = "Monday nights at 6:00 PM"
  charter_org      = "United Methodist Church of the Good Shepherd"
  bsa_council      = "Last Frontier Council"

  # Registration link (shown in "Get Involved" CTA section)
  beascout_url = "https://beascout.scouting.org"

  # Social / contact (optional — leave blank to hide)
  contact_email = "cubmaster@pack300.org"
  facebook_url  = ""

[menus]
  [[menus.main]]
    name       = "About"
    pageRef    = "/about"
    url        = "/about/"
    weight     = 1
  [[menus.main]]
    name       = "Events"
    pageRef    = "/events"
    url        = "/events/"
    weight     = 2
  [[menus.main]]
    name       = "FAQ"
    pageRef    = "/faq"
    url        = "/faq/"
    weight     = 3
  [[menus.main]]
    name       = "References"
    pageRef    = "/references"
    url        = "/references/"
    weight     = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow raw HTML in markdown content
