baseURL = "https://cubscoutpack300.org/"
languageCode = "en-us"
title = "Cub Scout Pack 300"

[params]
  description = "Cub Scout Pack 300 — Doing Our Best!"
  tagline = "Be Prepared · Do Your Best"
  pack_number = "300"

  # Calendar subscribe URLs (shown as buttons on the Events page)
  # Google: https://calendar.google.com/calendar/r?cid=YOUR_CALENDAR_ID
  # Apple / iCal: webcal://calendar.google.com/calendar/ical/YOUR_CALENDAR_ID/public/basic.ics
  calendar_subscribe_google = "en.usa#holiday@group.v.calendar.google.com"
  calendar_subscribe_ical   = "https://calendar.google.com/calendar/ical/en.usa%23holiday%40group.v.calendar.google.com/public/basic.ics"

  # Google Calendar embed URL
  # To get this: open Google Calendar → Settings (gear) → your calendar → "Integrate calendar"
  # Copy the "Embed code" src URL and paste it below.
  # Your calendar must be set to Public for this to work.
  calendar_embed_url = "https://calendar.google.com/calendar/embed?src=en.usa%23holiday%40group.v.calendar.google.com&ctz=America%2FChicago"

  # Location & meeting info (shown on homepage quick-facts strip)
  location         = "10928 SW 15th St, Yukon, OK 73099"
  meeting_schedule = "Most Mondays, but check our calendar"
  charter_org      = ""    # e.g. "First United Methodist Church"
  bsa_council      = ""    # e.g. "Spirit of Adventure Council"

  # Registration link (shown in "Get Involved" CTA section)
  beascout_url = "https://beascout.scouting.org"

  # Social / contact (optional — leave blank to hide)
  contact_email = "pack300leader@example.com"
  facebook_url  = ""

[menus]
  [[menus.main]]
    name       = "About"
    url        = "/#about"
    weight     = 2
  [[menus.main]]
    name       = "Events"
    pageRef    = "/events"
    url        = "/events/"
    weight     = 3
  [[menus.main]]
    name       = "References"
    pageRef    = "/references"
    url        = "/references/"
    weight     = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow raw HTML in markdown content
